<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uplink — Обслуживание</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1e1f22;
            color: #f2f3f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 420px;
            padding: 40px 24px;
        }

        .logo {
            width: 72px;
            height: 72px;
            background: #5865f2;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            animation: pulse 2s ease-in-out infinite;
        }

        .logo svg {
            width: 40px;
            height: 40px;
            fill: #fff;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #f2f3f5;
        }

        p {
            font-size: 15px;
            line-height: 1.5;
            color: #949ba4;
            margin-bottom: 28px;
        }

        .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid rgba(88, 101, 242, 0.2);
            border-top-color: #5865f2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .hint {
            margin-top: 24px;
            font-size: 13px;
            color: #6d6f78;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18L19.09 7.5 12 10.82 4.91 7.5 12 4.18zM4 8.93l7 3.5v7.24l-7-3.5V8.93zm16 7.24l-7 3.5v-7.24l7-3.5v7.24z"/>
            </svg>
        </div>
        <h1>Обновляем Uplink</h1>
        <p>Приложение на обслуживании. Обычно это занимает менее минуты.</p>
        <div class="spinner"></div>
        <div class="hint">Страница обновится автоматически</div>
    </div>
    <script>
        // Автоматически обновляем страницу каждые 5 секунд
        setTimeout(function check() {
            fetch(window.location.href, { method: 'HEAD', cache: 'no-store' })
                .then(function(r) {
                    if (r.ok) window.location.reload();
                    else setTimeout(check, 5000);
                })
                .catch(function() { setTimeout(check, 5000); });
        }, 5000);
    </script>
</body>
</html>
