server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip-сжатие
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;

    include /etc/nginx/mime.types;

    # WASM MIME type (дополнение к стандартным)
    types {
        application/wasm wasm;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Не кэшировать index.html — чтобы обновлённый JS подтягивался сразу
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Кэширование статики
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deploy webhook (GitHub → автодеплой)
    location /api/deploy-webhook/ {
        proxy_pass http://deploy-webhook:9000/;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
        client_max_body_size 10m;
    }

    # Проксирование запросов токенов к LiveKit Token Service
    location /livekit-token/ {
        proxy_pass http://livekit-token:7890/;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
    }

    # Проксирование Matrix API к Synapse
    location /_matrix/ {
        proxy_pass http://synapse:8008;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        client_max_body_size 50m;
    }
}
