server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS resolver — нужен для переменных в proxy_pass.
    # Без него nginx резолвит хосты только при старте и падает
    # если какой-то upstream-контейнер ещё не поднялся.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip-сжатие
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;

    include /etc/nginx/mime.types;

    # WASM MIME type (дополнение к стандартным)
    types {
        application/wasm wasm;
    }

    # ═══════════════════════════════════════════════════════
    # Matrix Federation — well-known endpoints.
    # Нужны для server discovery при федерации.
    # Даже если федерация сейчас выключена — endpoints готовы.
    # ═══════════════════════════════════════════════════════

    # Server-to-server discovery
    location = /.well-known/matrix/server {
        default_type application/json;
        return 200 '{"m.server": "uplink.wh-lab.ru:443"}';
    }

    # Client discovery
    location = /.well-known/matrix/client {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 200 '{"m.homeserver": {"base_url": "https://uplink.wh-lab.ru"}}';
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Не кэшировать index.html — чтобы обновлённый JS подтягивался сразу
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Кэширование статики
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ═══════════════════════════════════════════════════════
    # CORS для десктопных клиентов (Tauri, VSCode WebView).
    # Браузер использует тот же origin — CORS не нужен.
    # Synapse сам отдаёт CORS для /_matrix/, но кастомные
    # сервисы (token, bot-api, gif-api) требуют заголовков.
    # ═══════════════════════════════════════════════════════
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # ═══════════════════════════════════════════════════════
    # Прокси к внутренним сервисам.
    # Все upstream через переменные ($var) — nginx резолвит
    # их в runtime через resolver, а не при старте.
    # Если сервис недоступен — 502 для конкретного запроса,
    # но nginx продолжает работать и обслуживать остальные.
    #
    # ВАЖНО: при proxy_pass с переменной nginx НЕ делает
    # автоматическую подмену URI (как с литералом).
    # Поэтому используем rewrite для переписывания пути.
    # ═══════════════════════════════════════════════════════

    # Preflight OPTIONS — быстрый ответ без прокси к upstream
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        add_header Access-Control-Max-Age 86400;
        add_header Content-Length 0;
        return 204;
    }

    # Deploy webhook (GitHub → автодеплой)
    location /api/deploy-webhook/ {
        set $deploy_webhook http://deploy-webhook:9000;
        rewrite ^/api/deploy-webhook/(.*)$ /$1 break;
        proxy_pass $deploy_webhook;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
        client_max_body_size 10m;
    }

    # Проксирование запросов токенов к LiveKit Token Service
    location /livekit-token/ {
        set $livekit_token http://livekit-token:7890;
        rewrite ^/livekit-token/(.*)$ /$1 break;
        proxy_pass $livekit_token;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
    }

    # Bot Service admin API (для UI)
    location /bot-api/ {
        set $botservice http://uplink-botservice:7891;
        rewrite ^/bot-api/(.*)$ /api/$1 break;
        proxy_pass $botservice;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
    }

    # Tenor GIF proxy (через botservice)
    location /gif-api/ {
        set $botservice_gif http://uplink-botservice:7891;
        rewrite ^/gif-api/(.*)$ /api/gif/$1 break;
        proxy_pass $botservice_gif;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
    }

    # WebSocket gateway для SDK-ботов
    location /bot-ws/ {
        set $botservice_ws http://uplink-botservice:7891;
        rewrite ^/bot-ws/(.*)$ /bot-ws/$1 break;
        proxy_pass $botservice_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Webhook endpoint (для внешних сервисов — GitHub, Grafana и т.д.)
    location /hooks/ {
        set $botservice_hooks http://uplink-botservice:7891;
        rewrite ^/hooks/(.*)$ /hooks/$1 break;
        proxy_pass $botservice_hooks;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
        client_max_body_size 5m;
    }

    # Проксирование Matrix API к Synapse
    location /_matrix/ {
        set $synapse http://synapse:8008;
        proxy_pass $synapse;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        client_max_body_size 50m;
    }

    # Проксирование Synapse Admin API
    location /_synapse/ {
        set $synapse_admin http://synapse:8008;
        proxy_pass $synapse_admin;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }
}
