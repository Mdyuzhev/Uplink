server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip-сжатие
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;

    # COOP/COEP для SharedArrayBuffer (WASM crypto)
    # Временно отключено — ломает мобильные браузеры.
    # SharedArrayBuffer нужен только для WASM crypto, а initRustCrypto
    # и так обёрнут в try/catch с fallback на режим без E2E.
    # add_header Cross-Origin-Opener-Policy "same-origin" always;
    # add_header Cross-Origin-Embedder-Policy "credentialless" always;

    include /etc/nginx/mime.types;

    # WASM MIME type (дополнение к стандартным)
    types {
        application/wasm wasm;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэширование статики
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # add_header Cross-Origin-Opener-Policy "same-origin" always;
        # add_header Cross-Origin-Embedder-Policy "credentialless" always;
    }

    # Проксирование LiveKit WebSocket через nginx
    # Клиент подключается к wss://domain/livekit-ws → LiveKit Server
    location /livekit-ws {
        proxy_pass http://livekit:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Проксирование запросов токенов к LiveKit Token Service
    location /livekit-token/ {
        proxy_pass http://livekit-token:7890/;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
    }

    # Проксирование Matrix API к Synapse
    location /_matrix/ {
        proxy_pass http://synapse:8008;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }
}
