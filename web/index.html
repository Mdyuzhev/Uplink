<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1d23">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Uplink">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/uplink-icon-192.png">
    <title>Uplink</title>
    <style>
        /* Inline-спиннер: виден сразу, пока JS грузится */
        body { margin: 0; background: #1a1d23; }
        #splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            gap: 16px;
            color: #72767d;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #splash .sp {
            width: 32px; height: 32px;
            border: 3px solid #2e3136;
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: sp .8s linear infinite;
        }
        @keyframes sp { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <script>globalThis.global = globalThis;</script>
    <div id="root">
        <div id="splash"><div class="sp"></div><p>Uplink</p></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
