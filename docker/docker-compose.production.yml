# docker-compose.production.yml
# Standalone production compose для Yandex Cloud (uplink.wh-lab.ru)
#
# Использование:
#   cd docker && docker compose -f docker-compose.production.yml up -d --build
#
# Все порты слушают только 127.0.0.1 — наружу торчит host nginx (80/443)
# Конфиги Synapse лежат в docker/synapse-data/ (не в git, создаются на VM)

name: uplink

services:
  postgres:
    image: postgres:15
    container_name: uplink-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - uplink-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7
    container_name: uplink-redis
    restart: unless-stopped
    volumes:
      - uplink-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: uplink-synapse
    restart: unless-stopped
    ports:
      - "127.0.0.1:8008:8008"
    environment:
      SYNAPSE_CONFIG_DIR: /data
    volumes:
      - ./synapse-data:/data
      - uplink-synapse-media:/data/media_store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  synapse-admin:
    image: awesometechnologies/synapse-admin:latest
    container_name: uplink-synapse-admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      synapse:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  livekit-token:
    build:
      context: ./livekit-token
      dockerfile: Dockerfile
    container_name: uplink-livekit-token
    restart: unless-stopped
    ports:
      - "127.0.0.1:7890:7890"
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:7890/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  uplink:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: uplink-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:5174:80"
    depends_on:
      synapse:
        condition: service_healthy
    networks:
      - default
      - exposed
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  uplink-botservice:
    build:
      context: ./uplink-botservice
      dockerfile: Dockerfile
    container_name: uplink-botservice
    restart: unless-stopped
    ports:
      - "127.0.0.1:7891:7891"
    environment:
      HOMESERVER_URL: http://synapse:8008
      AS_TOKEN: ${BOT_AS_TOKEN}
      HS_TOKEN: ${BOT_HS_TOKEN}
      SERVER_NAME: uplink.wh-lab.ru
      SYNAPSE_ADMIN_TOKEN: ${SYNAPSE_ADMIN_TOKEN:-}
      GIPHY_API_KEY: ${GIPHY_API_KEY:-}
    volumes:
      - uplink-botservice-data:/app/data
    depends_on:
      synapse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:7891/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  deploy-webhook:
    build:
      context: ./deploy-webhook
      dockerfile: Dockerfile
    container_name: uplink-deploy-webhook
    restart: unless-stopped
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/ubuntu/projects/uplink:/repo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  uplink-postgres-data:
  uplink-redis-data:
  uplink-synapse-media:
  uplink-botservice-data:

networks:
  default:
    name: uplink-internal
  exposed:
    name: uplink-exposed
