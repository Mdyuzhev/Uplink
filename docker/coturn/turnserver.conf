# coturn TURN server для Uplink
# Обеспечивает relay медиа-трафика когда прямое соединение невозможно
# (Cloudflare Tunnel, строгий NAT, корпоративный firewall)

listening-port=3478
listening-ip=0.0.0.0

# Внешний IP сервера (публичный / NAT)
# coturn подставляет этот IP в relay-кандидаты для клиентов
# ВАЖНО: обновить при смене публичного IP
external-ip=81.200.8.171/192.168.1.74

# Диапазон портов для relay (медиа-трафик)
min-port=49152
max-port=49172

realm=uplink.local

# Статические credentials (shared с token service)
lt-cred-mech
user=uplink:uplink-turn-pass

fingerprint

# Без TLS для PoC (TURN over plain TCP/UDP)
no-tls
no-dtls

log-file=stdout
verbose
