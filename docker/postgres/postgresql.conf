# PostgreSQL тюнинг для Uplink (4GB RAM VM, 1GB PG limit)
# Оптимизация для Synapse workload (много INSERT/UPDATE, умеренный READ)

# Память
shared_buffers = 256MB          # 25% от лимита контейнера (1GB)
effective_cache_size = 768MB    # Оценка доступного кеша ОС
work_mem = 8MB                  # Для сортировок и хешей
maintenance_work_mem = 64MB     # Для VACUUM, CREATE INDEX

# WAL
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 80MB

# Планировщик
random_page_cost = 1.1          # SSD storage
effective_io_concurrency = 200  # SSD

# Подключения
listen_addresses = '*'          # Разрешить подключения из Docker-сети (обязательно!)
max_connections = 100           # Synapse cp_max=10 + botservice max=5 + exporter + admin

# Логирование
log_min_duration_statement = 500  # Логировать запросы дольше 500ms
log_checkpoints = on
log_connections = off
log_disconnections = off

# Статистика
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 1000
pg_stat_statements.track = all
