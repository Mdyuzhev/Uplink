server_name: "uplink.local"
pid_file: /data/homeserver.pid

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    resources:
      - names: [client, federation]
        compress: false

database:
  name: psycopg2
  args:
    user: synapse
    password: synapse_poc_pass
    database: synapse
    host: postgres
    port: 5432
    cp_min: 5
    cp_max: 10

redis:
  enabled: true
  host: redis
  port: 6379

log_config: "/data/uplink.local.log.config"

media_store_path: /data/media_store
max_upload_size: 50M

enable_registration: false
enable_registration_without_verification: false

registration_shared_secret: "A2GGP+gI+hrjsD/i8yudRSPhLo0hkkZYjSPQjonrhC4="

macaroon_secret_key: "xFFHoHY6X48DpQtITMyfDnRTtrYU0T+cfETsqpaAsQE="
form_secret: "Gvn9IOP9KG+q1kMuCzmQlScAmHS76TRHEkABvn6XLHw="

signing_key_path: "/data/uplink.local.signing.key"

trusted_key_servers:
  - server_name: "matrix.org"

suppress_key_server_warning: true

report_stats: false

# Отключаем rate limiting для PoC (не для production!)
rc_login:
  address:
    per_second: 100
    burst_count: 100
  account:
    per_second: 100
    burst_count: 100
  failed_attempts:
    per_second: 100
    burst_count: 100
rc_message:
  per_second: 100
  burst_count: 100
rc_joins:
  local:
    per_second: 100
    burst_count: 100
  remote:
    per_second: 100
    burst_count: 100
rc_invites:
  per_room:
    per_second: 100
    burst_count: 100
  per_user:
    per_second: 100
    burst_count: 100

# E2E шифрование включено для всех новых комнат
encryption_enabled_by_default_for_room_type: "all"
allow_device_name_lookup_over_federation: false

# User Directory: показывать всех пользователей сервера
user_directory:
  enabled: true
  search_all_users: true
  prefer_local_users: true
