server_name: "uplink.wh-lab.ru"
pid_file: /data/homeserver.pid

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    resources:
      - names: [client, federation]
        compress: false

database:
  name: psycopg2
  args:
    user: synapse
    password: ZuifNEN8YwAEPvymbBOhYNGT5O-3hduB
    database: synapse
    host: postgres
    port: 5432
    cp_min: 5
    cp_max: 10

redis:
  enabled: true
  host: redis
  port: 6379

log_config: "/data/uplink.wh-lab.ru.log.config"

media_store_path: /data/media_store
max_upload_size: 50M

enable_registration: false
enable_registration_without_verification: false

registration_shared_secret: "8mk8UFyM8syoW75ul5nruQxztAFFbaxagYQQ3AfE7wk="

macaroon_secret_key: "dXj8HJHcqQNdi5836yWXmjHAQeLYkcvyNQRJ982zHtw="
form_secret: "dHCWNEZld6QGYp9035lnJzn60z72iTt6SpB2idJU9dg="

signing_key_path: "/data/uplink.wh-lab.ru.signing.key"

trusted_key_servers:
  - server_name: "matrix.org"

suppress_key_server_warning: true

report_stats: false

# Production rate limiting
rc_login:
  address:
    per_second: 10
    burst_count: 30
  account:
    per_second: 10
    burst_count: 30
  failed_attempts:
    per_second: 3
    burst_count: 5
rc_message:
  per_second: 5
  burst_count: 20
rc_joins:
  local:
    per_second: 10
    burst_count: 20
  remote:
    per_second: 5
    burst_count: 10
rc_invites:
  per_room:
    per_second: 5
    burst_count: 10
  per_user:
    per_second: 5
    burst_count: 10

# E2E шифрование управляется на уровне клиента (тогл при создании комнаты)
allow_device_name_lookup_over_federation: false

# User Directory: показывать всех пользователей сервера
user_directory:
  enabled: true
  search_all_users: true
  prefer_local_users: true

# Application Services (боты)
app_service_config_files:
  - /data/appservice-bots.yaml

# Федерация: инфраструктура готова, но пока выключена.
# Для включения — убрать federation_domain_whitelist или добавить конкретные домены.
federation_domain_whitelist: []

