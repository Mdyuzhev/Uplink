name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ─── Шаг 1: Собрать web/dist (один раз, переиспользовать) ───
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install & build web
        working-directory: web
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/

  # ─── Шаг 2: Desktop (Tauri) ───
  build-desktop:
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: Uplink-Windows-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact-name: Uplink-macOS-ARM64
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact-name: Uplink-macOS-Intel
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact-name: Uplink-Linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: web
        run: npm install --legacy-peer-deps

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Windows code signing (активируется после добавления секретов WINDOWS_CERTIFICATE + WINDOWS_CERTIFICATE_PASSWORD)
          TAURI_SIGNING_PRIVATE_KEY: ${{ matrix.platform == 'windows-latest' && secrets.WINDOWS_CERTIFICATE || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ matrix.platform == 'windows-latest' && secrets.WINDOWS_CERTIFICATE_PASSWORD || '' }}
        with:
          projectPath: web
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            web/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            web/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            web/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            web/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            web/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage

  # ─── Шаг 3: VS Code Extension ───
  build-vscode:
    needs: build-web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - name: Install extension dependencies
        run: |
          # Break workspace link to prevent vsce from including parent files
          mv package.json package.json.bak
          cd vscode && npm install --legacy-peer-deps
          cd .. && mv package.json.bak package.json

      - name: Copy SPA into extension
        run: |
          mkdir -p vscode/webview-dist
          cp -r web/dist/* vscode/webview-dist/

      - name: Build & package extension
        run: |
          cd vscode
          npm run build
          # Убираем prepublish (web/dist уже скопирован выше)
          node -e "const p=require('./package.json'); delete p.scripts['vscode:prepublish']; delete p.scripts['build:webview']; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 4))"

          # Копируем только нужное в изолированную директорию (vsce сканирует ../ в монорепо)
          PACK_DIR=$(mktemp -d)
          cp -r package.json package-lock.json out webview-dist resources LICENSE .vscodeignore node_modules "$PACK_DIR/"
          cd "$PACK_DIR"
          git init
          git config user.email "ci@uplink.local"
          git config user.name "CI"
          git add -A
          git commit -m "ci packaging"
          ./node_modules/.bin/vsce package --allow-missing-repository
          cp *.vsix "$GITHUB_WORKSPACE/vscode/"

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: Uplink-VSCode-Extension
          path: vscode/*.vsix

  # ─── Шаг 4: Создать релиз ───
  release:
    needs: [build-desktop, build-vscode]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten and rename artifacts
        run: |
          mkdir -p release-assets

          # Windows
          find artifacts/Uplink-Windows-x64 -name "*.exe" -exec cp {} release-assets/ \;
          find artifacts/Uplink-Windows-x64 -name "*.msi" -exec cp {} release-assets/ \;

          # macOS ARM64
          find artifacts/Uplink-macOS-ARM64 -name "*.dmg" -exec sh -c \
            'cp "$1" "release-assets/Uplink-macOS-ARM64.dmg"' _ {} \;

          # macOS Intel
          find artifacts/Uplink-macOS-Intel -name "*.dmg" -exec sh -c \
            'cp "$1" "release-assets/Uplink-macOS-Intel.dmg"' _ {} \;

          # Linux
          find artifacts/Uplink-Linux-x64 -name "*.deb" -exec cp {} release-assets/ \;
          find artifacts/Uplink-Linux-x64 -name "*.AppImage" -exec cp {} release-assets/ \;

          # VS Code
          find artifacts/Uplink-VSCode-Extension -name "*.vsix" -exec cp {} release-assets/ \;

          echo "=== Release assets ==="
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          name: "Uplink ${{ github.ref_name }}"
          body: |
            ## Uplink ${{ github.ref_name }}

            Self-hosted корпоративный мессенджер на базе Matrix Protocol.
            E2E-шифрование, аудио/видеозвонки, боты, федерация.

            ### Скачать

            | Платформа | Файл |
            |-----------|------|
            | **Windows** (установщик) | `.exe` / `.msi` |
            | **macOS** Apple Silicon | `Uplink-macOS-ARM64.dmg` |
            | **macOS** Intel | `Uplink-macOS-Intel.dmg` |
            | **Linux** Debian/Ubuntu | `.deb` |
            | **Linux** Universal | `.AppImage` |
            | **VS Code Extension** | `.vsix` |
            | **Браузер / Мобильный** | https://uplink.wh-lab.ru |

            ### Установка VS Code Extension

            1. Скачать `.vsix` файл
            2. VS Code → Extensions → `...` → "Install from VSIX..."
            3. Настройки → `uplink.serverUrl` → URL вашего сервера

            ### Что нового

            Production-ready релиз: безопасность, мониторинг, бэкапы, федерация.
