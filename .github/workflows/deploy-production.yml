name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd web && npm install --legacy-peer-deps

      - name: TypeScript check
        run: cd web && npx tsc --noEmit

      - name: Lint
        run: cd web && npm run lint

      - name: Tests
        run: cd web && npm test

      - name: Build
        run: cd web && npm run build

      - name: Notify — check failed
        if: failure()
        continue-on-error: true
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_NUM: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          SUBJECT=$(echo "$COMMIT_MSG" | head -1 | sed 's/["\]/\\&/g')
          curl -sf -X POST "https://uplink.wh-lab.ru/hooks/ci" \
            -H "Content-Type: application/json" \
            -H "x-deploy-event: check-failed" \
            -d "{\"run\":$RUN_NUM,\"commit\":\"$SUBJECT\",\"url\":\"https://github.com/$REPO/actions/runs/$RUN_ID\"}" || true

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ~/projects/uplink && bash deploy-prod.sh

      # deploy-prod.sh сам отправляет успех/ошибку через botservice.
      # Этот шаг — страховка на случай если SSH-соединение само не установилось.
      - name: Notify — SSH action failed
        if: steps.deploy.outcome == 'failure'
        continue-on-error: true
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_NUM: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          SUBJECT=$(echo "$COMMIT_MSG" | head -1 | sed 's/["\]/\\&/g')
          curl -sf -X POST "https://uplink.wh-lab.ru/hooks/ci" \
            -H "Content-Type: application/json" \
            -H "x-deploy-event: deploy" \
            -d "{\"status\":\"failure\",\"commit\":{\"message\":\"$SUBJECT\"},\"error\":\"SSH action failed — deploy script did not start\"}" || true
