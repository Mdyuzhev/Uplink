name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd web && npm install --legacy-peer-deps

      - name: TypeScript check
        run: cd web && npx tsc --noEmit

      - name: Lint
        run: cd web && npm run lint

      - name: Tests
        run: cd web && npm test

      - name: Build
        run: cd web && npm run build

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ~/projects/uplink && bash deploy-prod.sh

      - name: Notify CI channel — success
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        env:
          CI_ROOM_ID: ${{ secrets.CI_ROOM_ID }}
          MATRIX_BOT_TOKEN: ${{ secrets.MATRIX_BOT_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_NUM: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          SUBJECT=$(echo "$COMMIT_MSG" | head -1)
          SHORT_SHA="${SHA:0:7}"
          TXN_ID="ci_$(date +%s)_${RANDOM}"

          BODY="✅ Deploy #${RUN_NUM} — ${SUBJECT} (${SHORT_SHA})"

          HTML=$(cat <<'HTMLEOF'
          <table><tr><td>
          <h4>✅ Deploy #__RUN_NUM__</h4>
          <b>__SUBJECT__</b><br/>
          <code>__SHORT_SHA__</code> · <a href="https://github.com/__REPO__/commit/__SHA__">diff</a> · <a href="https://github.com/__REPO__/actions/runs/__RUN_ID__">logs</a><br/>
          <sub>by __ACTOR__</sub>
          </td></tr></table>
          HTMLEOF
          )

          HTML=$(echo "$HTML" | sed \
            -e "s|__RUN_NUM__|${RUN_NUM}|g" \
            -e "s|__SUBJECT__|${SUBJECT}|g" \
            -e "s|__SHORT_SHA__|${SHORT_SHA}|g" \
            -e "s|__SHA__|${SHA}|g" \
            -e "s|__REPO__|${REPO}|g" \
            -e "s|__RUN_ID__|${RUN_ID}|g" \
            -e "s|__ACTOR__|${ACTOR}|g" \
          )

          jq -n \
            --arg body "$BODY" \
            --arg html "$HTML" \
            '{"msgtype":"m.text","body":$body,"format":"org.matrix.custom.html","formatted_body":$html}' | \
          curl -v -X PUT \
            "https://uplink.wh-lab.ru/_matrix/client/v3/rooms/${CI_ROOM_ID}/send/m.room.message/${TXN_ID}" \
            -H "Authorization: Bearer ${MATRIX_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @-

      - name: Notify CI channel — failure
        if: steps.deploy.outcome == 'failure'
        continue-on-error: true
        env:
          CI_ROOM_ID: ${{ secrets.CI_ROOM_ID }}
          MATRIX_BOT_TOKEN: ${{ secrets.MATRIX_BOT_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_NUM: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          SUBJECT=$(echo "$COMMIT_MSG" | head -1)
          SHORT_SHA="${SHA:0:7}"
          TXN_ID="ci_$(date +%s)_${RANDOM}"

          BODY="❌ Deploy FAILED #${RUN_NUM} — ${SUBJECT} (${SHORT_SHA})"

          HTML=$(cat <<'HTMLEOF'
          <table><tr><td>
          <h4>❌ Deploy FAILED #__RUN_NUM__</h4>
          <b>__SUBJECT__</b><br/>
          <code>__SHORT_SHA__</code> · <a href="https://github.com/__REPO__/actions/runs/__RUN_ID__">▶ Логи</a><br/>
          <sub>by __ACTOR__</sub>
          </td></tr></table>
          HTMLEOF
          )

          HTML=$(echo "$HTML" | sed \
            -e "s|__RUN_NUM__|${RUN_NUM}|g" \
            -e "s|__SUBJECT__|${SUBJECT}|g" \
            -e "s|__SHORT_SHA__|${SHORT_SHA}|g" \
            -e "s|__REPO__|${REPO}|g" \
            -e "s|__RUN_ID__|${RUN_ID}|g" \
            -e "s|__ACTOR__|${ACTOR}|g" \
          )

          jq -n \
            --arg body "$BODY" \
            --arg html "$HTML" \
            '{"msgtype":"m.text","body":$body,"format":"org.matrix.custom.html","formatted_body":$html}' | \
          curl -v -X PUT \
            "https://uplink.wh-lab.ru/_matrix/client/v3/rooms/${CI_ROOM_ID}/send/m.room.message/${TXN_ID}" \
            -H "Authorization: Bearer ${MATRIX_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @-
