name: Post-Deploy Setup (one-time)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Диагностика и исправление
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ~/projects/uplink/docker

            echo "=== Все контейнеры (включая stopped) ==="
            docker ps -a --filter "name=uplink" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"

            echo "=== Логи botservice (последние 80 строк) ==="
            docker logs uplink-botservice --tail 80 2>&1 || echo "Контейнер не существует"

            echo "=== Логи web (последние 20 строк) ==="
            docker logs uplink-web --tail 20 2>&1 || echo "Контейнер не существует"

            echo "=== Сборка botservice ==="
            docker compose -f docker-compose.production.yml build uplink-botservice 2>&1 | tail -30

            echo "=== Запуск botservice ==="
            docker compose -f docker-compose.production.yml up -d uplink-botservice --no-deps 2>&1

            echo "=== Статус botservice после запуска ==="
            sleep 5
            docker ps --filter "name=uplink-botservice" --format "table {{.Names}}\t{{.Status}}"
            docker logs uplink-botservice --tail 30 2>&1
