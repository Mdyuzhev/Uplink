name: Post-Deploy Setup (one-time)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Диагностика и исправление
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ~/projects/uplink/docker

            echo "=== Статус контейнеров ==="
            docker compose -f docker-compose.production.yml ps

            echo "=== Логи botservice (последние 50 строк) ==="
            docker compose -f docker-compose.production.yml logs uplink-botservice --tail 50 2>&1 || echo "Нет логов"

            echo "=== Логи postgres (последние 20 строк) ==="
            docker compose -f docker-compose.production.yml logs postgres --tail 20 2>&1 || echo "Нет логов"

            echo "=== Переменные окружения botservice ==="
            docker compose -f docker-compose.production.yml config --format json 2>/dev/null | python3 -c "
            import json,sys
            d=json.load(sys.stdin)
            s=d.get('services',{}).get('uplink-botservice',{})
            env=s.get('environment',{})
            for k,v in env.items():
                if 'PASS' in k or 'SECRET' in k or 'TOKEN' in k:
                    print(f'{k}=***')
                else:
                    print(f'{k}={v}')
            " || echo "Не удалось получить env"

            echo "=== Файл .env (наличие PG-переменных) ==="
            grep -E "^POSTGRES" .env 2>/dev/null || echo ".env: PG-переменные не найдены"
