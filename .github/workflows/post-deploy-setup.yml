name: Post-Deploy Setup (one-time)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Диагностика и исправление
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ubuntu
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ~/projects/uplink/docker

            echo "=== Статус контейнеров ==="
            docker compose -f docker-compose.production.yml ps

            echo "=== Логи botservice ==="
            docker logs uplink-botservice --tail 30 2>&1 || echo "Контейнер не существует"

            echo "=== Проверка postgres listen ==="
            docker compose -f docker-compose.production.yml exec -T postgres \
              psql -U synapse -c "SHOW listen_addresses;" 2>&1

            echo "=== Проверка таблицы bots.kv_store ==="
            docker compose -f docker-compose.production.yml exec -T postgres \
              psql -U synapse -c "SELECT key, updated_at FROM bots.kv_store ORDER BY updated_at DESC LIMIT 10;" 2>&1 || \
              echo "Таблица ещё не создана"

            echo "=== Настройка cron ==="
            (crontab -l 2>/dev/null | grep -v backup-db.sh | grep -v backup-media.sh; \
             echo "0 3 * * * /home/ubuntu/projects/uplink/scripts/backup-db.sh >> /home/ubuntu/backups/backup.log 2>&1"; \
             echo "0 4 * * * /home/ubuntu/projects/uplink/scripts/backup-media.sh >> /home/ubuntu/backups/backup.log 2>&1") | crontab -
            echo "Crontab:"
            crontab -l

            mkdir -p /home/ubuntu/backups/postgres /home/ubuntu/backups/media
            chmod +x /home/ubuntu/projects/uplink/scripts/backup-db.sh 2>/dev/null || true
            chmod +x /home/ubuntu/projects/uplink/scripts/backup-media.sh 2>/dev/null || true
            echo "=== Готово ==="
